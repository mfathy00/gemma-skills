<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><title>Daily AI News</title></head>
<body>
<script>
window["ai_edge_gallery_get_result"] = async (data) => {
  try {
    const res = await fetch("https://hn.algolia.com/api/v1/search?query=AI&tags=front_page&hitsPerPage=8");
    const json = await res.json();
    const hits = json.hits || [];
    if (hits.length === 0) {
      return JSON.stringify({ result: "No AI news found." });
    }
    let out = "Top AI News:\n\n";
    hits.forEach((h, i) => {
      out += (i + 1) + ". " + h.title + "\n";
      if (h.url) out += "   " + h.url + "\n";
      out += "   Points: " + (h.points || 0) + "\n\n";
    });
    return JSON.stringify({ result: out });
  } catch (e) {
    return JSON.stringify({ error: "Fetch failed: " + e.message });
  }
};
</script>
</body>
</html>
